# .github/workflows/gamestore-ci.yml
#
# Pipeline CI/CD — GameStore API
# TP J5 — Complétez les TODO dans l'ordre des jobs.
#
# Structure fournie : noms des jobs, ordre, needs.
# À compléter : les commandes run: dans chaque step.

name: GameStore CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── JOB 1 : Tests unitaires ──────────────────────────────────────────────
  # Premier job — pas de needs, tourne immédiatement au push
  unit-tests:
    name: Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          # TODO — pip install flask pytest pytest-cov pytest-html
          pip install flask pytest pytest-cov pytest-html

      - name: Lancer les tests unitaires
        run: |
          # TODO — pytest tests/test_unit.py -v
          #         --cov=app_gamestore
          #         --cov-report=html:reports/coverage
          #         --html=reports/unit_report.html
          #         --self-contained-html
          mkdir -p reports
          pytest tests/test_tp1_unit.py -v \
          --cov=app_gamestore --cov-report=html:reports/coverage \
          --html=reports/unit_report.html --self-contained-html

      - name: Uploader les rapports
        uses: actions/upload-artifact@v4
        with:
          name: unit-reports
          path: |
            # TODO — reports/coverage/
            # TODO — reports/unit_report.html
            reports/coverage/
            reports/unit_report.html

  # ── JOB 2 : Tests Newman ────────────────────────────────────────────────
  # Ne tourne QUE si unit-tests est vert
  newman-tests:
    name: Tests API Newman
    runs-on: ubuntu-latest
    needs: unit-tests           # ← attend la fin de unit-tests

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer Newman
        run: |
          # TODO — npm install -g newman newman-reporter-htmlextra
          npm install -g newman newman-reporter-htmlextra

      - name: Démarrer l'API GameStore
        run: |
          pip install flask
          # TODO — démarrer app_gamestore.py en arrière-plan (&)
          # TODO — attendre que Flask soit prêt (sleep 2)
          # TODO — vérifier avec curl http://localhost:5000/health
          python app_gamestore.py &
          sleep 2
          curl --retry 5 --retry-delay 1 http://localhost:5000/health

      - name: Lancer la collection Newman
        run: |
          # TODO — newman run tests/collection_gamestore_j5.json
          #         --env-var "base_url=http://localhost:5000"
          #         --reporters cli,htmlextra
          #         --reporter-htmlextra-export reports/newman_report.html
          mkdir -p reports
          newman run tests/collection_gamestore_j5.json \
          --env-var "base_url=http://localhost:5000" \
          --reporters cli,htmlextra \
          --reporter-htmlextra-export reports/newman_report.html

      - name: Uploader le rapport Newman
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: |
            # TODO — reports/newman_report.html
            reports/newman_report.html

  # ── JOB 3 : Tests UI Playwright ─────────────────────────────────────────
  # Ne tourne QUE si les deux jobs précédents sont verts
  playwright-tests:
    name: Tests UI Playwright
    runs-on: ubuntu-latest
    needs: [unit-tests, newman-tests]   # ← attend les deux

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer Playwright
        run: |
          # TODO — pip install flask playwright pytest-playwright
          # TODO — playwright install chromium --with-deps
          pip install flask playwright pytest-playwright
          playwright install chromium --with-deps
          pip install flask playwright pytest-playwright
          playwright install chromium --with-deps
          

      - name: Démarrer l'API GameStore
        run: |
          pip install flask
          # TODO — même chose que dans le job newman
          python app_gamestore.py &
          sleep 2
          curl --retry 5 --retry-delay 1 http://localhost:5000/health

      - name: Lancer les tests UI
        run: |
          # TODO — pytest tests/test_playwright_j5.py -v
          #         --html=reports/playwright_report.html
          #         --self-contained-html
          mkdir -p reports
          pytest tests/test_playwright_j5.py -v \
          --html=reports/playwright_report.html \
          --self-contained-html

      - name: Uploader screenshots et rapport
        if: always()    # uploader MÊME si les tests échouent
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: |
            # TODO — reports/playwright_report.html
            # TODO — screenshots/
            reports/playwright_report.html
            screenshots/